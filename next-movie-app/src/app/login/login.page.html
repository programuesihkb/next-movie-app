<ion-content [fullscreen]="true">
  <div class="login-wrap">
    <div class="login-logo">
      <img src="../../assets/img/nextMovieLogeDemo.jpg" alt="MovieApp logo" />
    </div>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Login</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <form [formGroup]="form" (ngSubmit)="login()">
          <ion-item>
            <ion-label position="floating">Email</ion-label>
            <ion-input type="email" formControlName="email" autocomplete="email" />
          </ion-item>

          <ion-item>
            <ion-label position="floating">Password</ion-label>
            <ion-input type="password" formControlName="password" autocomplete="current-password" />
          </ion-item>

          <ion-button
            expand="block"
            type="submit"
            class="ion-margin-top"
            [disabled]="form.invalid || loading()"
          >
            @if (loading()) {
              <ion-spinner name="crescent" slot="start" />
            }
            {{ loading() ? 'Logging in…' : 'Login' }}
          </ion-button>
        </form>

        <p class="register-link">
          <ion-text color="medium">Don't have an account? </ion-text>
          <a routerLink="/register">Register</a>
        </p>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
